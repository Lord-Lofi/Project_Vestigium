name: VestigiumPlayer
version: '${project.version}'
main: com.vestigium.vestigiumplayer.VestigiumPlayer
api-version: '1.21'
description: Player progression, stat tracking, and unlockable titles
authors: [ Lord-Lofi ]
load: POSTWORLD
depend:
  - VestigiumLib

commands:
  vptitle:
    description: View and set your Vestigium title
    usage: /vptitle [list | set <title>]
    permission: vestigium.title.use
    permission-message: §cYou do not have permission to use titles.
  vpnotoriety:
    description: Check or manage notoriety
    usage: /vpnotoriety [check|clear|add] [player] [amount]
    permission: vestigium.notoriety.use
    permission-message: §cYou do not have permission to use this command.
  vpitem:
    description: Give utility items to yourself or another player
    usage: /vpitem give <item> [player]
    permission: vestigium.item.admin
    permission-message: §cYou do not have permission to give utility items.

permissions:
  vestigium.title.use:
    description: View and equip unlocked titles
    default: true

  vestigium.title.admin:
    description: Grant titles to other players
    default: op

  vestigium.notoriety.use:
    description: Check your own notoriety score
    default: true

  vestigium.notoriety.admin:
    description: Check, clear, and modify any player's notoriety
    default: op

  vestigium.item.admin:
    description: Give utility items to players
    default: op
