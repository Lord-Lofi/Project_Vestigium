name: VestigiumMagic
version: '${project.version}'
main: com.vestigium.vestigiummagic.VestigiumMagic
api-version: '1.21'
description: Spell casting system, mana management, and artifact items
authors: [ Lord-Lofi ]
load: POSTWORLD
depend:
  - VestigiumLib

commands:
  vartifact:
    description: Give a Vestigium artifact item to a player
    usage: /vartifact give <player> <SOUL_MIRROR|HOLLOW_CROWN|WAYFARER_ORB|ANTECEDENT_KEY|TIDAL_LENS>
    permission: vestigium.artifact.admin
    permission-message: §cYou do not have permission to give artifact items.

  vmana:
    description: Check your current mana
    usage: /vmana
    permission: vestigium.mana.check
    permission-message: §cYou do not have permission to use this command.

permissions:
  vestigium.spell.use:
    description: Cast spells using spell items
    default: true

  vestigium.mana.check:
    description: Check your own mana pool with /vmana
    default: true

  vestigium.artifact.admin:
    description: Give artifact items to any player
    default: op
