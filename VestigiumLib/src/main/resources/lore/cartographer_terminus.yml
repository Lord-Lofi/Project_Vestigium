# Waystone Omega — the final stone. Deepest lore in the Cartographer chain.
# Requires Resonant Cipher to read.

main: |
  This is the last waystone I will set.

  Forty stones. Forty paths. Each one led somewhere the map said should
  not exist. I have stopped trying to explain the geometry.

  If you followed all forty stones you know what I know. You have seen
  what the omen does to the land unchecked. You understand now why the
  Conclave does not speak of the Antecedent in complete sentences.

  The name at the bottom of every waystone is mine.
  I do not know how.

  — The Final Cartographer
