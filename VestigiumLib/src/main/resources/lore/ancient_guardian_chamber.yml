# Ancient Guardian Chamber — lore about the Named Wardens and the deep dark.

main: |
  CHAMBER RECORD — Conclave Deep Survey

  We do not know how old the Wardens are. The sculk around them predates
  our oldest maps. They are not simply large. They are different in kind.

  The Pale Listener heard us before we entered the shaft. It did not
  attack. It waited.

  The Harbinger has not moved across three surveys. We believe it is
  waiting for an omen threshold we have not yet reached.

  We are taking measures to ensure we do not reach it.
  The measures are not working.
