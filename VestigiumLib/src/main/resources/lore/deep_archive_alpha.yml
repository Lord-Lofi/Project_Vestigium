# Deep Archive Alpha — founding history of the world's factions.

main: |
  ARCHIVE ENTRY 001 — The Founding Record

  Before the factions formalized, there were only survivors. The villagers
  rebuilt first. The bandits organized second — someone had to move what
  the villagers could not defend. The mercenaries came third, practical
  in the way violence becomes practical when nothing else works.

  The Cultists were already there. They say the omen is not a problem
  to be solved. They say it is a message to be read. We have asked them
  what it says for three generations.
  They smile and say we are not ready.

  The Drowned came up from the water during the second flood. They do not
  speak of what they saw below.
  The End Remnants do not discuss their origin. We have stopped asking.
  The Conclave catalogues all of this. We do not know if that helps.
