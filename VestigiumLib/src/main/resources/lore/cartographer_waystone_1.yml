# Waystone Alpha — first stone in the Final Cartographer chain.
# Delivered to players as a written book via a Resonant Terminal (lectern on sculk).

main: |
  WAYSTONE ALPHA

  This stone marks the first known path into the lowlands. The surveyor
  did not return. We erected this in their memory.

  Whoever reads this: the path is passable. The path behind is no longer
  what you left.

  The name at the bottom of this stone is mine. I do not remember carving it.

  — The Final Cartographer, First Expedition
