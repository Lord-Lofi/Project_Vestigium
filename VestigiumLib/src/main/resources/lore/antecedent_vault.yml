# Antecedent Vault — core world lore about the Antecedent and the Conclave schism.
# Requires Antecedent Cipher to read.

main: |
  SEALED VAULT — Conclave Internal Record

  The Antecedent was not a person. It was a condition — a state of the
  world before the omen became a discrete force. When the first cataclysm
  occurred, the omen separated from the land like a shadow from a body.

  The Cultists believe they can restore the Antecedent state.
  They are correct that it was once whole.
  They are wrong about what returning to it would mean.

  Do not show this to anyone who uses the word "restoration"
  without hesitation.
