name: VestigiumLib
version: '${project.version}'
main: com.vestigium.lib.VestigiumLib
api-version: '1.21'
description: Core library and APIs for the Project Vestigium plugin suite
authors: [ Lord-Lofi ]
load: STARTUP
softdepend:
  - WorldGuard
  - GriefPrevention

permissions:
  vestigium.*:
    description: Grants all Vestigium permissions across the entire suite
    default: op
    children:
      vestigium.admin: true
      vestigium.use: true

  vestigium.admin:
    description: Grants all Vestigium administrative permissions
    default: op
    children:
      vestigium.cipher.admin: true
      vestigium.tome.admin: true
      vestigium.warden.admin: true
      vestigium.structures.admin: true
      vestigium.currency.admin: true
      vestigium.quest.admin: true
      vestigium.title.admin: true
      vestigium.artifact.admin: true
      vestigium.lore.bypass: true

  vestigium.use:
    description: Grants all standard player-use permissions
    default: true
    children:
      vestigium.currency.use: true
      vestigium.title.use: true
      vestigium.spell.use: true
      vestigium.market.use: true
      vestigium.mana.check: true

  vestigium.lore.bypass:
    description: Bypass cipher requirements when reading terminals
    default: op
