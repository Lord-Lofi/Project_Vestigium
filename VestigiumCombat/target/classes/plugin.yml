name: VestigiumCombat
version: '${project.version}'
main: com.vestigium.vestigiumcombat.VestigiumCombat
api-version: '1.21'
description: Combo system, custom status effects, and combat state tracking
authors: [ Lord-Lofi ]
load: POSTWORLD
depend:
  - VestigiumLib

permissions:
  vestigium.combat.use:
    description: Benefit from the combo and custom status effect systems
    default: true

  vestigium.combat.admin:
    description: Manage and inspect combat state for any player
    default: op
