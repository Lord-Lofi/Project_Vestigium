name: VestigiumEnd
version: '${project.version}'
main: com.vestigium.vestigiumend.VestigiumEnd
api-version: '1.21'
description: End biomes, pre-Shattering lore systems, End civilization structures
authors: [ Lord-Lofi ]
load: POSTWORLD
depend:
  - VestigiumLib

commands:
  veend:
    description: VestigiumEnd admin commands
    usage: /veend corruption <clear|status> <player>
    permission: vestigium.end.admin

permissions:
  vestigium.end.admin:
    description: Administrative access to VestigiumEnd systems
    default: op
